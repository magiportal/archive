<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio — MAGI Portal</title>
  <link rel="stylesheet" href="style.css" />
  <style>

    body { overflow: hidden; }

    /* ── STUDIO TOOLBAR ──────────────────────────── */

    .studio-toolbar {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--white);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      z-index: 100;
      gap: 0;
    }

    .toolbar-section {
      display: flex;
      align-items: center;
      height: 100%;
      border-right: 1px solid var(--line);
      padding: 0 16px;
      gap: 8px;
    }

    .toolbar-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── SEARCH ───────────────────────────────────── */

    .toolbar-search {
      flex: 1;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 16px;
      gap: 10px;
      border-right: 1px solid var(--line);
    }

    .toolbar-search-icon {
      color: var(--dim);
      flex-shrink: 0;
    }

    .toolbar-search-input {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--black);
      background: none;
      border: none;
      outline: none;
      max-width: 320px;
    }

    .toolbar-search-input::placeholder { color: var(--faint); }

    .search-count {
      font-size: 10px;
      color: var(--dim);
      white-space: nowrap;
    }

    /* ── ADD CARD ─────────────────────────────────── */

    .toolbar-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      background: none;
      border: 1px solid var(--line);
      padding: 5px 14px 6px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
      white-space: nowrap;
    }

    .toolbar-btn:hover { color: var(--black); border-color: var(--secondary); }
    .toolbar-btn.primary { background: var(--black); color: var(--white); border-color: var(--black); }
    .toolbar-btn.primary:hover { background: #333; }

    .type-chip {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px 4px;
      cursor: pointer;
      border: 1px solid var(--line);
      background: none;
      color: var(--dim);
      transition: all 0.1s;
      user-select: none;
    }

    .type-chip:hover { color: var(--black); }
    .type-chip.active { background: var(--black); color: var(--white); border-color: var(--black); }

    .type-chip[data-type="wip"]       { --chip-col: #c8e800; }
    .type-chip[data-type="technique"] { --chip-col: #1eceff; }
    .type-chip[data-type="scrap"]     { --chip-col: #ff20c0; }
    .type-chip[data-type="reference"] { --chip-col: #ff6b1a; }

    .type-chip.active[data-type="wip"]       { background: #4a5200; color: #c8e800; border-color: #4a5200; }
    .type-chip.active[data-type="technique"] { background: #003a4a; color: #1eceff; border-color: #003a4a; }
    .type-chip.active[data-type="scrap"]     { background: #7a005e; color: #ff20c0; border-color: #7a005e; }
    .type-chip.active[data-type="reference"] { background: #7a3200; color: #ff6b1a; border-color: #7a3200; }

    /* ── CANVAS ───────────────────────────────────── */

    .studio-canvas {
      position: fixed;
      top: 104px; /* nav + toolbar */
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      cursor: default;
    }

    /* dot grid background */
    .studio-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, #c8c8c8 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .canvas-inner {
      position: absolute;
      width: 8000px;
      height: 8000px;
      top: 0;
      left: 0;
      transform-origin: 0 0;
    }

    /* ── CARDS ────────────────────────────────────── */

    .studio-card {
      position: absolute;
      width: 260px;
      background: var(--white);
      border: 1px solid var(--line);
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.15s, opacity 0.25s;
      z-index: 10;
    }

    .studio-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 20; }
    .studio-card.is-dragging { cursor: grabbing; box-shadow: 0 12px 40px rgba(0,0,0,0.15); z-index: 50; }
    .studio-card.is-dimmed { opacity: 0.18; }
    .studio-card.is-highlighted { box-shadow: 0 0 0 2px var(--black), 0 8px 24px rgba(0,0,0,0.12); z-index: 30; }

    .card-type-bar {
      height: 3px;
      width: 100%;
    }

    .studio-card[data-type="wip"]       .card-type-bar { background: #c8e800; }
    .studio-card[data-type="technique"] .card-type-bar { background: #1eceff; }
    .studio-card[data-type="scrap"]     .card-type-bar { background: #ff20c0; }
    .studio-card[data-type="reference"] .card-type-bar { background: #ff6b1a; }

    .card-header {
      padding: 10px 12px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-type-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .studio-card[data-type="wip"]       .card-type-label { color: #4a5200; }
    .studio-card[data-type="technique"] .card-type-label { color: #003a4a; }
    .studio-card[data-type="scrap"]     .card-type-label { color: #7a005e; }
    .studio-card[data-type="reference"] .card-type-label { color: #7a3200; }

    .card-header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-edit {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      cursor: pointer;
      background: none;
      border: 1px solid var(--line);
      padding: 1px 7px 2px;
      font-family: 'DM Mono', monospace;
      transition: color 0.1s, border-color 0.1s;
    }

    .card-edit:hover { color: var(--black); border-color: var(--secondary); }

    .card-delete {
      font-size: 16px;
      line-height: 1;
      color: var(--faint);
      cursor: pointer;
      transition: color 0.1s;
      background: none;
      border: none;
      padding: 0 2px;
      font-family: inherit;
      flex-shrink: 0;
    }

    .card-delete:hover { color: var(--black); }

    .card-body {
      padding: 8px 12px 14px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--black);
      line-height: 1.35;
      margin-bottom: 5px;
      word-break: break-word;
    }

    .card-text {
      font-size: 11px;
      color: var(--secondary);
      line-height: 1.7;
      word-break: break-word;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #f0f0f0;
      border-top: 1px solid var(--line-mid);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-footer {
      padding: 8px 12px;
      border-top: 1px solid var(--line-mid);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-author { font-size: 10px; color: var(--muted); }
    .card-date   { font-size: 10px; color: var(--faint); }

    .card-tags {
      padding: 8px 12px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      border-top: 1px solid var(--line-mid);
    }

    .card-yt-badge {
      position: absolute;
      bottom: 8px;
      left: 10px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(10,10,10,0.82);
      color: #fff;
      padding: 3px 8px 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-tag {
      font-size: 9px;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 1px 6px 2px;
    }

    /* ── ADD MODAL ────────────────────────────────── */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.4);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--white);
      border: 1px solid var(--line);
      width: 480px;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(8px);
      transition: transform 0.25s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    .modal-overlay.is-open .modal { transform: translateY(0); }

    .modal-header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
    }

    .modal-close {
      font-size: 18px;
      color: var(--dim);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.1s;
    }

    .modal-close:hover { color: var(--black); }

    .modal-body {
      padding: 20px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-label {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-input,
    .form-textarea {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--black);
      background: none;
      border: 1px solid var(--line);
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.1s;
      resize: none;
      width: 100%;
      box-sizing: border-box;
    }

    .form-input:focus,
    .form-textarea:focus { border-color: var(--black); }

    .form-textarea { min-height: 80px; }

    .form-type-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .form-upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }

    .form-upload-or {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .form-upload-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid var(--line);
      padding: 4px 12px 5px;
      cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }

    .form-upload-btn:hover { color: var(--black); border-color: var(--secondary); }

    .form-img-preview {
      margin-top: 10px;
      position: relative;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .form-img-preview img {
      width: 100%;
      max-height: 160px;
      object-fit: cover;
      display: block;
    }

    .form-img-clear {
      position: absolute;
      top: 6px;
      right: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(10,10,10,0.75);
      color: #fff;
      border: none;
      padding: 3px 8px 4px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .form-img-clear:hover { background: var(--black); }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .card-thumb-yt { position: relative; }



    /* ── CANVAS HINT ──────────────────────────────── */

    .canvas-hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      pointer-events: none;
      white-space: nowrap;
      z-index: 5;
    }

    /* ── RESET / ZOOM ─────────────────────────────── */

    .canvas-controls {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 100;
    }

    .canvas-ctrl-btn {
      width: 36px;
      height: 36px;
      background: var(--white);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--dim);
      transition: color 0.1s, border-color 0.1s;
    }

    .canvas-ctrl-btn:hover { color: var(--black); border-color: var(--secondary); }

    /* ── ONBOARDING CARD ──────────────────────────── */

    .studio-card.is-onboarding {
      width: 300px;
      background: #0a0a0a;
      border-color: #222;
    }

    .studio-card.is-onboarding .card-type-bar { background: var(--line); }
    .studio-card.is-onboarding .card-type-label { color: #666; }
    .studio-card.is-onboarding .card-title { color: #fff; font-size: 14px; }
    .studio-card.is-onboarding .card-text { color: #888; white-space: pre-line; line-height: 1.9; }
    .studio-card.is-onboarding .card-footer { border-top-color: #222; }
    .studio-card.is-onboarding .card-author { color: #555; }
    .studio-card.is-onboarding .card-date { color: #444; }
    .studio-card.is-onboarding .card-tag { border-color: #222; color: #555; }
    .studio-card.is-onboarding .card-tags { padding-bottom: 12px; }
    .studio-card.is-onboarding:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.3); }

    /* ── LINK PREVIEW ─────────────────────────────── */

    .card-link-preview {
      position: relative;
      min-height: 44px;
      background: #f5f5f5;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .card-link-preview:hover { background: #efefef; }

    .link-preview-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.18;
    }

    .link-preview-loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
    }

    .link-preview-spinner {
      font-size: 11px;
      color: var(--faint);
      animation: blink 1.2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .link-preview-body {
      position: relative;
      padding: 10px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .link-preview-domain-row {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
    }

    .link-preview-domain {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .link-preview-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--black);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .link-preview-desc {
      font-size: 10px;
      color: var(--secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .link-preview-open-hint {
      font-size: 10px;
      color: var(--faint);
      margin-left: auto;
    }

    /* ── LIVE CURSORS ─────────────────────────────── */

    .live-cursor {
      position: absolute;
      pointer-events: none;
      z-index: 999;
      transform: translate(-2px, -2px);
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }

    .live-cursor svg {
      flex-shrink: 0;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.25));
    }

    .live-cursor-name {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #fff;
      padding: 2px 6px 3px;
      white-space: nowrap;
      margin-top: 14px;
    }

    /* ── PROMINENT PIN BUTTON ─────────────────────── */

    .pin-btn {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 14px 36px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      white-space: nowrap;
    }

    .pin-btn:hover {
      background: #222;
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
    }

    .pin-btn:active { transform: translateX(-50%) translateY(0); }

    /* ── PRESENCE PANEL ───────────────────────────── */

    .presence-panel {
      position: fixed;
      bottom: 24px;
      left: 24px;
      width: 180px;
      background: var(--white);
      border: 1px solid var(--line);
      z-index: 100;
      font-family: 'DM Mono', monospace;
    }

    .presence-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
    }

    .presence-panel-label {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .presence-toggle {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color 0.1s;
    }

    .presence-toggle:hover { color: var(--black); }

    .presence-panel-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .presence-cursor-preview {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .presence-dot {
      width: 14px;
      height: 17px;
      flex-shrink: 0;
    }

    .presence-name-row {
      display: flex;
      gap: 4px;
    }

    .presence-name-input {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--black);
      background: none;
      border: 1px solid var(--line);
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.1s;
      min-width: 0;
    }

    .presence-name-input:focus { border-color: var(--black); }

    .presence-name-save {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 0 10px;
      cursor: pointer;
      transition: background 0.1s;
      flex-shrink: 0;
    }

    .presence-name-save:hover { background: #333; }

    .presence-hint {
      font-size: 9px;
      color: var(--faint);
      letter-spacing: 0.06em;
    }

    .presence-divider {
      height: 1px;
      background: var(--line);
      margin: 2px 0;
    }

    .presence-others {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 16px;
    }

    .presence-other-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .presence-other-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .presence-other-name {
      font-size: 10px;
      color: var(--secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .presence-empty {
      font-size: 10px;
      color: var(--faint);
    }

  </style>
</head>

  <!-- ── TOOLBAR ────────────────────────────────── -->
  <div class="studio-toolbar">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // ── STATE ──────────────────────────────────────────
    const STORE_KEY = 'magi-studio-cards';
    let cards = [];
    let selectedType = 'all';
    let searchQuery = '';
    let activeFilter = 'all';

    // ── YOUTUBE HELPER ─────────────────────────────────
    function getYouTubeId(url) {
      if (!url) return null;
      const patterns = [
        /youtu\.be\/([^?&]+)/,
        /youtube\.com\/watch\?v=([^&]+)/,
        /youtube\.com\/embed\/([^?&]+)/,
        /youtube\.com\/shorts\/([^?&]+)/,
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    // ── LINK PREVIEW CACHE ─────────────────────────────
    const previewCache = {};

    async function fetchLinkPreview(url) {
      if (previewCache[url]) return previewCache[url];
      try {
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const res = await fetch(proxy);
        const data = await res.json();
        const html = data.contents;
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const title = doc.querySelector('meta[property="og:title"]')?.content
          || doc.querySelector('title')?.textContent || '';
        const desc = doc.querySelector('meta[property="og:description"]')?.content
          || doc.querySelector('meta[name="description"]')?.content || '';
        const img = doc.querySelector('meta[property="og:image"]')?.content || '';
        const domain = new URL(url).hostname.replace('www.', '');
        const preview = { title: title.trim(), desc: desc.trim(), img, domain };
        previewCache[url] = preview;
        return preview;
      } catch { return null; }
    }

    function isExternalUrl(url) {
      if (!url) return false;
      if (url.startsWith('data:')) return false;
      if (getYouTubeId(url)) return false;
      return url.startsWith('http');
    }

    function getThumbHtml(c) {
      if (!c.img) return '';
      const ytId = getYouTubeId(c.img);
      if (ytId) {
        return `<a class="card-thumb card-thumb-yt" href="${c.img}" target="_blank" rel="noopener">
          <img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" alt="${c.title}" />
          <div class="card-yt-badge">▶ YouTube</div>
        </a>`;
      }
      if (isExternalUrl(c.img)) {
        const domain = (() => { try { return new URL(c.img).hostname.replace('www.',''); } catch { return c.img; } })();
        return `<a class="card-thumb card-link-preview" data-url="${c.img}" href="${c.img}" target="_blank" rel="noopener">
          <div class="link-preview-loading">
            <span class="link-preview-domain">${domain}</span>
            <span class="link-preview-spinner">…</span>
          </div>
        </a>`;
      }
      return `<div class="card-thumb"><img src="${c.img}" alt="" /></div>`;
    }

    function hydrateLinkPreviews(cardEl) {
      cardEl.querySelectorAll('.card-link-preview[data-url]').forEach(async el => {
        const url = el.dataset.url;
        const preview = await fetchLinkPreview(url);
        if (!preview) return;
        el.innerHTML = `
          ${preview.img ? `<div class="link-preview-bg" style="background-image:url('${preview.img}')"></div>` : ''}
          <div class="link-preview-body">
            <div class="link-preview-domain-row">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              <span class="link-preview-domain">${preview.domain}</span>
              <span class="link-preview-open-hint">↗</span>
            </div>
            <div class="link-preview-title">${preview.title}</div>
            ${preview.desc ? `<div class="link-preview-desc">${preview.desc}</div>` : ''}
          </div>
        `;
      });
    }

    // ── PAN + ZOOM STATE ───────────────────────────────
    const canvas   = document.getElementById('studio-canvas');
    const inner    = document.getElementById('canvas-inner');
    let panX = 0, panY = 0;
    let scale = 1;
    const SCALE_MIN = 0.3, SCALE_MAX = 2, SCALE_STEP = 0.15;
    let isPanning = false;
    let panStartX, panStartY;

    function applyTransform() {
      inner.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      reprojectCursors();
    }

    // canvas-space positions of remote cursors
    const cursorPositions = {};

    function reprojectCursors() {
      for (const [id, el] of Object.entries(cursorEls)) {
        const pos = cursorPositions[id];
        if (!pos) continue;
        el.style.left = (pos.x * scale + panX) + 'px';
        el.style.top  = (pos.y * scale + panY) + 'px';
      }
    }

    function zoomAt(delta, cx, cy) {
      // cx, cy = screen-space centre of zoom
      const newScale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, scale + delta));
      if (newScale === scale) return;
      // adjust pan so zoom centres on cx,cy
      const ratio = newScale / scale;
      panX = cx - ratio * (cx - panX);
      panY = cy - ratio * (cy - panY);
      scale = newScale;
      applyTransform();
    }

    function centreOnCards() {
      if (!cards.length) return;
      const vw = window.innerWidth;
      const vh = window.innerHeight - 104;
      const xs = cards.map(c => c.x);
      const ys = cards.map(c => c.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs) + 280;
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys) + 220;
      const gw = maxX - minX, gh = maxY - minY;
      // fit scale
      scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, Math.min(vw / (gw + 160), vh / (gh + 160))));
      const midX = (minX + maxX) / 2;
      const midY = (minY + maxY) / 2;
      panX = vw / 2 - midX * scale;
      panY = vh / 2 - midY * scale;
      applyTransform();
    }

    // pan on background drag
    canvas.addEventListener('mousedown', e => {
      if (e.target !== canvas && !e.target.classList.contains('canvas-inner')) return;
      isPanning = true;
      panStartX = e.clientX - panX;
      panStartY = e.clientY - panY;
      canvas.style.cursor = 'grabbing';
    });

    document.addEventListener('mousemove', e => {
      if (!isPanning) return;
      panX = e.clientX - panStartX;
      panY = e.clientY - panStartY;
      applyTransform();
    });

    document.addEventListener('mouseup', () => {
      isPanning = false;
      canvas.style.cursor = 'default';
    });

    // scroll to zoom
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY < 0 ? SCALE_STEP : -SCALE_STEP;
      zoomAt(delta, e.clientX, e.clientY - 104);
    }, { passive: false });

    // zoom buttons
    document.getElementById('btn-zoom-in').addEventListener('click', () => {
      zoomAt(SCALE_STEP, window.innerWidth / 2, (window.innerHeight - 104) / 2);
    });
    document.getElementById('btn-zoom-out').addEventListener('click', () => {
      zoomAt(-SCALE_STEP, window.innerWidth / 2, (window.innerHeight - 104) / 2);
    });
    document.getElementById('btn-reset-view').addEventListener('click', centreOnCards);

    // ── SUPABASE CLIENT ────────────────────────────────
    const SUPA_URL = 'https://hzzhuikzvdfcizkuelte.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6emh1aWt6dmRmY2l6a3VlbHRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NDgxOTUsImV4cCI6MjA5MjMyNDE5NX0.jYE-ruAQ9c-5Q2en9G5jKcV1xWEcGsCQhSPuB5wy8d0';
    const TABLE    = 'studio_cards';
    const db       = supabase.createClient(SUPA_URL, SUPA_KEY);

    async function loadCards() {
      showStatus('Loading…');
      const { data, error } = await db.from(TABLE).select('*').order('date', { ascending: true });
      if (data) {
        cards = data.map(row => ({ ...row, tags: row.tags ? row.tags.split(',').filter(Boolean) : [] }));
      }
      if (cards.length === 0) await seedCards();
      renderAll();
      centreOnCards();
      hideStatus();
      subscribeRealtime();
    }

    async function saveCard(card) {
      const row = { ...card, tags: (card.tags || []).join(',') };
      const { error } = await db.from(TABLE).upsert(row);
      if (error) console.error('saveCard error:', error);
    }

    async function updateCard(card) {
      const row = { ...card, tags: (card.tags || []).join(',') };
      const { error } = await db.from(TABLE).update(row).eq('id', card.id);
      if (error) console.error('updateCard error:', error);
    }

    async function deleteCard(id) {
      const { error } = await db.from(TABLE).delete().eq('id', id);
      if (error) console.error('deleteCard error:', error);
    }

    async function seedCards() {
      const cx = 4000, cy = 4000;
      const seeds = [
        { id: 'onboarding', type: 'reference', title: '👋 Welcome to the Community Board', text: 'This is a shared scratchpad for MAGI students and staff.\n\n— Drag cards to reposition\n— Drag background to pan · Scroll to zoom\n— Filter by type or search keywords\n— Hit "+ Pin Work" to add your own', author: 'MAGI Portal', date: '2026', tags: ['start here'], x: cx - 160, y: cy - 160, pinned: true, img: null },
        { id: uid(), type: 'wip',       title: 'Example — Work in Progress', text: 'Use for anything actively being built. Describe where it\'s at, what\'s working, what isn\'t.', author: 'Student Name', date: '21 Apr 2026', tags: ['example', 'wip'],       x: cx + 180, y: cy - 160, pinned: false, img: null },
        { id: uid(), type: 'technique', title: 'Example — Technique',         text: 'Found a good way to do something? Pin it here. Code snippets, workflow discoveries worth sharing.', author: 'Student Name', date: '21 Apr 2026', tags: ['example', 'technique'], x: cx + 180, y: cy + 100, pinned: false, img: null },
        { id: uid(), type: 'scrap',     title: 'Example — Scrap',             text: 'Shelved ideas, dead ends, interesting failures. Useful for the cohort to learn from.',              author: 'Student Name', date: '21 Apr 2026', tags: ['example', 'scrap'],     x: cx - 160, y: cy + 100, pinned: false, img: null },
      ];
      for (const c of seeds) await saveCard(c);
      cards = seeds;
    }

    // ── REALTIME ───────────────────────────────────────
    function subscribeRealtime() {
      db.channel('studio_cards_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, payload => {
          const { eventType, new: record, old: old_record } = payload;

          if (eventType === 'INSERT') {
            const c = { ...record, tags: record.tags ? record.tags.split(',').filter(Boolean) : [] };
            if (!cards.find(x => x.id === c.id)) {
              cards.push(c);
              inner.appendChild(makeCardEl(c));
              applyFilters();
            }
          } else if (eventType === 'UPDATE') {
            const idx = cards.findIndex(x => x.id === record.id);
            if (idx !== -1) {
              cards[idx] = { ...record, tags: record.tags ? record.tags.split(',').filter(Boolean) : [] };
              const el = inner.querySelector(`[data-id="${record.id}"]`);
              if (el) el.replaceWith(makeCardEl(cards[idx]));
              applyFilters();
            }
          } else if (eventType === 'DELETE') {
            cards = cards.filter(x => x.id !== old_record.id);
            const el = inner.querySelector(`[data-id="${old_record.id}"]`);
            if (el) el.remove();
          }
        })
        .subscribe();
    }

    // ── PRESENCE PANEL ─────────────────────────────────
    const MY_ID    = localStorage.getItem('magi-cursor-id') || (() => { const id = uid(); localStorage.setItem('magi-cursor-id', id); return id; })();
    const MY_COLOR = localStorage.getItem('magi-cursor-color') || (() => { const c = `hsl(${Math.floor(Math.random()*360)},70%,55%)`; localStorage.setItem('magi-cursor-color', c); return c; })();

    const presenceDot   = document.getElementById('presence-dot');
    const presenceInput = document.getElementById('presence-name');
    const presenceSave  = document.getElementById('presence-name-save');
    const presenceOthers = document.getElementById('presence-others');
    const presenceToggle = document.getElementById('presence-toggle');
    const presenceBody   = document.getElementById('presence-panel-body') || document.getElementById('presence-body');

    presenceDot.querySelector('path').setAttribute('fill', MY_COLOR);
    presenceInput.value = localStorage.getItem('magi-cursor-name') || '';

    presenceSave.addEventListener('click', () => {
      const n = presenceInput.value.trim();
      localStorage.setItem('magi-cursor-name', n);
      presenceSave.textContent = '✓';
      setTimeout(() => presenceSave.textContent = 'Set', 1200);
    });

    presenceInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') presenceSave.click();
    });

    let panelOpen = true;
    presenceToggle.addEventListener('click', () => {
      panelOpen = !panelOpen;
      presenceBody.style.display = panelOpen ? '' : 'none';
      presenceToggle.textContent = panelOpen ? '−' : '+';
    });

    // track other online users
    const onlineUsers = {};

    function updatePresenceList() {
      const others = Object.values(onlineUsers);
      if (!others.length) {
        presenceOthers.innerHTML = '<div class="presence-empty">Just you</div>';
        return;
      }
      presenceOthers.innerHTML = others.map(u =>
        `<div class="presence-other-row">
          <svg width="10" height="12" viewBox="0 0 18 22" fill="none"><path d="M1 1L1 16L5 12L13 12L1 1Z" fill="${u.color}" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>
          <span class="presence-other-name">${u.name || 'User'}</span>
        </div>`
      ).join('');
    }

    updatePresenceList();

    // ── LIVE CURSORS + DRAG SYNC ──────────────────────
    const cursorEls = {};
    let cursorChannel = null;

    function getMyName() { return localStorage.getItem('magi-cursor-name') || ''; }

    function startCursors() {
      cursorChannel = db.channel('presence', { config: { broadcast: { self: false } } });

      cursorChannel.on('broadcast', { event: 'cursor' }, ({ payload }) => {
        const { id, color, name, x, y, active } = payload;
        if (id === MY_ID) return;

        if (!active) {
          if (cursorEls[id]) { cursorEls[id].remove(); delete cursorEls[id]; }
          delete cursorPositions[id];
          delete onlineUsers[id];
          updatePresenceList();
          return;
        }

        // track online
        onlineUsers[id] = { color, name };
        updatePresenceList();

        if (!cursorEls[id]) {
          const el = document.createElement('div');
          el.className = 'live-cursor';
          el.innerHTML = `
            <svg width="18" height="22" viewBox="0 0 18 22" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1L1 16L5 12L13 12L1 1Z" fill="${color}" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
            ${name ? `<div class="live-cursor-name" style="background:${color}">${name}</div>` : ''}
          `;
          document.getElementById('studio-canvas').appendChild(el);
          cursorEls[id] = el;
        } else if (name) {
          // update name if changed
          let lbl = cursorEls[id].querySelector('.live-cursor-name');
          if (!lbl) { lbl = document.createElement('div'); lbl.className = 'live-cursor-name'; lbl.style.background = color; cursorEls[id].appendChild(lbl); }
          lbl.textContent = name;
        }

        // store canvas-space position for reprojection on pan/zoom
        cursorPositions[id] = { x, y };

        // convert canvas space → screen space for this client's current pan/zoom
        const sx = x * scale + panX;
        const sy = y * scale + panY;
        cursorEls[id].style.left = sx + 'px';
        cursorEls[id].style.top  = sy + 'px';
      });

      cursorChannel.on('broadcast', { event: 'drag' }, ({ payload }) => {
        const { id: cardId, x, y } = payload;
        const el = inner.querySelector(`[data-id="${cardId}"]`);
        if (el) { el.style.left = x + 'px'; el.style.top = y + 'px'; }
      });

      cursorChannel.subscribe();

      let lastCursor = 0;
      canvas.addEventListener('mousemove', e => {
        const now = Date.now();
        if (now - lastCursor < 40) return;
        lastCursor = now;
        const rect = canvas.getBoundingClientRect();
        // convert screen → canvas space so other clients can reconstruct correctly
        const cx = (e.clientX - rect.left - panX) / scale;
        const cy = (e.clientY - rect.top  - panY) / scale;
        cursorChannel.send({ type: 'broadcast', event: 'cursor',
          payload: { id: MY_ID, color: MY_COLOR, name: getMyName(), x: cx, y: cy, active: true }
        });
      });

      canvas.addEventListener('mouseleave', () => {
        cursorChannel.send({ type: 'broadcast', event: 'cursor',
          payload: { id: MY_ID, color: MY_COLOR, name: getMyName(), x: 0, y: 0, active: false }
        });
      });
    }

    function broadcastDrag(cardId, x, y) {
      if (!cursorChannel) return;
      cursorChannel.send({ type: 'broadcast', event: 'drag', payload: { id: cardId, x, y } });
    }
    function showStatus(msg) {
      let s = document.getElementById('db-status');
      if (!s) { s = document.createElement('div'); s.id = 'db-status'; s.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:DM Mono,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);z-index:200;pointer-events:none'; document.body.appendChild(s); }
      s.textContent = msg;
    }
    function hideStatus() { const s = document.getElementById('db-status'); if (s) s.textContent = ''; }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

    // ── RENDER ─────────────────────────────────────────
    function renderAll() {
      inner.innerHTML = '';
      cards.forEach(c => inner.appendChild(makeCardEl(c)));
      applyFilters();
    }

    function makeCardEl(c) {
      const el = document.createElement('div');
      el.className = 'studio-card' + (c.id === 'onboarding' ? ' is-onboarding' : '');
      el.dataset.id   = c.id;
      el.dataset.type = c.type;
      el.style.left   = c.x + 'px';
      el.style.top    = c.y + 'px';

      const typeName = c.id === 'onboarding' ? 'Community Board' :
        ({ wip: 'Work in Progress', technique: 'Technique', scrap: 'Scrap', reference: 'Reference' }[c.type] || c.type);
      const tagsHtml = (c.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('');
      const imgHtml  = getThumbHtml(c);
      const deleteBtn = c.id === 'onboarding' ? '' : `<button class="card-delete" data-id="${c.id}">×</button>`;
      const editBtn   = c.id === 'onboarding' ? '' : `<button class="card-edit" data-id="${c.id}">Edit</button>`;

      el.innerHTML = `
        <div class="card-type-bar"></div>
        <div class="card-header">
          <span class="card-type-label">${typeName}</span>
          <div class="card-header-actions">${editBtn}${deleteBtn}</div>
        </div>
        <div class="card-body">
          <div class="card-title">${c.title}</div>
          <div class="card-text">${c.text}</div>
        </div>
        ${imgHtml}
        ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
        <div class="card-footer">
          <span class="card-author">${c.author}</span>
          <span class="card-date">${c.date}</span>
        </div>`;

      // delete — only if button exists
      const delBtn = el.querySelector('.card-delete');
      if (delBtn) {
        delBtn.addEventListener('click', e => {
          e.stopPropagation();
          showConfirm(`Delete "${c.title}"?`, 'This can\'t be undone.', () => {
            cards = cards.filter(x => x.id !== c.id);
            deleteCard(c.id);
            el.remove();
          });
        });
      }

      // edit — only if button exists
      const edBtn = el.querySelector('.card-edit');
      if (edBtn) {
        edBtn.addEventListener('click', e => {
          e.stopPropagation();
          openModal(c);
        });
      }

      // hydrate any link previews asynchronously
      setTimeout(() => hydrateLinkPreviews(el), 0);

      // drag
      let dragging = false, ox, oy;

      el.addEventListener('mousedown', e => {
        if (e.target.classList.contains('card-delete')) return;
        if (e.target.classList.contains('card-edit')) return;
        // don't drag if clicking a link, button, or interactive element
        if (e.target.closest('a, button, input, textarea, select')) return;
        e.stopPropagation();
        dragging = true;
        ox = (e.clientX - panX) / scale - c.x;
        oy = (e.clientY - panY) / scale - c.y;
        el.classList.add('is-dragging');
        el.style.zIndex = 50;
      });

      document.addEventListener('mousemove', e => {
        if (!dragging) return;
        c.x = (e.clientX - panX) / scale - ox;
        c.y = (e.clientY - panY) / scale - oy;
        el.style.left = c.x + 'px';
        el.style.top  = c.y + 'px';
        broadcastDrag(c.id, c.x, c.y);
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        el.classList.remove('is-dragging');
        el.style.zIndex = '';
        updateCard(c);
      });

      return el;
    }

    // ── FILTER + SEARCH ────────────────────────────────
    function applyFilters() {
      const q    = searchQuery.toLowerCase().trim();
      const type = activeFilter;
      const els  = inner.querySelectorAll('.studio-card');
      let matches = 0;

      els.forEach(el => {
        const c       = cards.find(x => x.id === el.dataset.id);
        if (!c) return;
        const typeOk  = type === 'all' || c.type === type;
        const text    = [c.title, c.text, c.author, ...(c.tags || [])].join(' ').toLowerCase();
        const searchOk = !q || text.includes(q);
        const visible  = typeOk && searchOk;

        el.classList.toggle('is-dimmed',     !visible);
        el.classList.toggle('is-highlighted', visible && q.length > 0);
        if (visible) matches++;
      });

      const countEl = document.getElementById('search-count');
      countEl.textContent = q ? `${matches} match${matches !== 1 ? 'es' : ''}` : '';
    }

    // ── TOOLBAR SEARCH ─────────────────────────────────
    document.getElementById('board-search').addEventListener('input', function() {
      searchQuery = this.value;
      applyFilters();
    });

    // ── TYPE FILTER CHIPS ──────────────────────────────
    document.querySelectorAll('.studio-toolbar .type-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.studio-toolbar .type-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        activeFilter = this.dataset.type;
        applyFilters();
      });
    });

    // ── MODAL ──────────────────────────────────────────
    const modal   = document.getElementById('modal');
    let modalType = 'wip';
    let editingId = null; // null = add mode, string = edit mode

    function openModal(card) {
      editingId = card ? card.id : null;
      const isEdit = !!card;

      document.getElementById('modal-title-text').textContent = isEdit ? 'Edit Pin' : 'Pin a Work';
      document.getElementById('modal-submit').textContent     = isEdit ? 'Save Changes' : 'Pin to Board';

      if (isEdit) {
        modalType = card.type;
        document.getElementById('form-title').value  = card.title;
        document.getElementById('form-desc').value   = card.text;
        document.getElementById('form-author').value = card.author;
        document.getElementById('form-tags').value   = (card.tags || []).join(', ');
        document.getElementById('form-img').value    = card.img || '';
        if (card.img) showImgPreview(card.img); else clearImgPreview();
      } else {
        modalType = 'wip';
        ['form-title','form-desc','form-author','form-tags','form-img'].forEach(id => {
          document.getElementById(id).value = '';
        });
      }

      document.querySelectorAll('#modal-type-row .type-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.type === modalType);
      });

      modal.classList.add('is-open');
      document.getElementById('form-title').focus();
    }

    function closeModal() {
      modal.classList.remove('is-open');
      editingId = null;
      clearImgPreview();
    }

    document.getElementById('btn-add-card').addEventListener('click', () => openModal(null));
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    document.querySelectorAll('#modal-type-row .type-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('#modal-type-row .type-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        modalType = this.dataset.type;
      });
    });

    document.getElementById('modal-submit').addEventListener('click', async () => {
      const title   = document.getElementById('form-title').value.trim();
      const text    = document.getElementById('form-desc').value.trim();
      const author  = document.getElementById('form-author').value.trim() || 'User';
      const tagsRaw = document.getElementById('form-tags').value.trim();
      const img     = document.getElementById('form-img').value.trim();

      if (!title) { document.getElementById('form-title').focus(); return; }

      // disable button to prevent spam
      const submitBtn = document.getElementById('modal-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = editingId ? 'Saving…' : 'Pinning…';

      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

      if (editingId) {
        const c = cards.find(x => x.id === editingId);
        if (c) {
          c.type = modalType; c.title = title; c.text = text;
          c.author = author; c.tags = tags; c.img = img || null;
          // render immediately, save in background
          const el = inner.querySelector(`[data-id="${editingId}"]`);
          if (el) el.replaceWith(makeCardEl(c));
          applyFilters();
          closeModal();
          await updateCard(c);
        }
      } else {
        const today = new Date().toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
        const vw = window.innerWidth, vh = window.innerHeight - 104;
        const cx = (vw / 2 - panX) / scale + (Math.random() - 0.5) * 200;
        const cy = (vh / 2 - panY) / scale + (Math.random() - 0.5) * 200;
        const card = { id: uid(), type: modalType, title, text, author, date: today, tags, img: img || null, x: cx, y: cy, pinned: false };
        // add locally immediately so user sees it right away
        cards.push(card);
        inner.appendChild(makeCardEl(card));
        applyFilters();
        closeModal();
        // save to Supabase in background (realtime will skip it since id already exists locally)
        await saveCard(card);
      }

      submitBtn.disabled = false;
      submitBtn.textContent = editingId ? 'Save Changes' : 'Pin to Board';
    });

    // ── IMAGE UPLOAD ───────────────────────────────────
    const fileInput   = document.getElementById('form-img-file');
    const imgInput    = document.getElementById('form-img');
    const previewWrap = document.getElementById('form-img-preview');
    const previewImg  = document.getElementById('form-img-preview-img');

    function showImgPreview(src) {
      previewImg.src = src;
      previewWrap.style.display = 'block';
    }

    function clearImgPreview() {
      previewImg.src = '';
      previewWrap.style.display = 'none';
      imgInput.value = '';
      fileInput.value = '';
    }

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      // resize + compress before base64
      const reader = new FileReader();
      reader.onload = e => {
        const original = e.target.result;
        const img = new Image();
        img.onload = () => {
          const MAX = 800;
          const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
          const canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * ratio);
          canvas.height = Math.round(img.height * ratio);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          const b64 = canvas.toDataURL('image/jpeg', 0.82);
          imgInput.value = b64;
          showImgPreview(b64);
        };
        img.src = original;
      };
      reader.readAsDataURL(file);
    });

    // preview URL input as well
    imgInput.addEventListener('blur', () => {
      const val = imgInput.value.trim();
      if (val && !val.startsWith('data:')) {
        showImgPreview(val);
      } else if (!val) {
        clearImgPreview();
      }
    });

    document.getElementById('form-img-clear').addEventListener('click', clearImgPreview);
    const confirmOverlay = document.getElementById('confirm-overlay');
    let confirmCallback = null;

    function showConfirm(title, msg, onOk) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-msg').textContent   = msg;
      confirmCallback = onOk;
      confirmOverlay.classList.add('is-open');
    }

    function closeConfirm() {
      confirmOverlay.classList.remove('is-open');
      confirmCallback = null;
    }

    document.getElementById('confirm-close').addEventListener('click', closeConfirm);
    document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);
    confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) closeConfirm(); });
    document.getElementById('confirm-ok').addEventListener('click', () => {
      if (confirmCallback) confirmCallback();
      closeConfirm();
    });

    // double-click canvas to open pin modal
    canvas.addEventListener('dblclick', e => {
      if (e.target !== canvas && !e.target.classList.contains('canvas-inner')) return;
      openModal(null);
    });
    let hintHidden = false;
    canvas.addEventListener('mousedown', () => {
      if (!hintHidden) {
        hintHidden = true;
        document.getElementById('canvas-hint').style.opacity = '0';
      }
    });

    // ── INIT ───────────────────────────────────────────
    loadCards(); // async — renders when ready
    startCursors();
  </script>

</body>
</html>
